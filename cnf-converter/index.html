<div class="cnf-tool">
  <h1>FOL → CNF Converter</h1>
  <p>Enter a first-order logic formula:</p>

  <textarea id="fol-input" rows="4" placeholder="∀x.(P(x) → Q(x))"></textarea>
  <button id="convert-btn">Convert to CNF</button>

  <div id="output-area" style="display:none">
    <h3>CNF Output:</h3>
    <pre id="cnf-output"></pre>
  </div>

  <div id="error-area" style="display:none; color:red">
    <pre id="error-output"></pre>
  </div>
</div>

<script type="module">
  import { initWasm, parseToCNF } from "/wasm/loader.js";

  
  initWasm().then(() => {
    document.getElementById("convert-btn").disabled = false;
  }).catch(err => {
    console.error("WASM init failed:", err.message, err);
  });

  document.getElementById("convert-btn").addEventListener("click", async () => {
  const input = document.getElementById("fol-input").value.trim();
  if (!input) return;

  const result = await parseToCNF(input);

  if (result.startsWith("ERROR:")) {
    document.getElementById("output-area").style.display = "none";
    document.getElementById("error-output").textContent = result;
    document.getElementById("error-area").style.display = "block";
  } else {
    document.getElementById("error-area").style.display = "none";
    document.getElementById("cnf-output").textContent = result;
    document.getElementById("output-area").style.display = "block";
  }
}); 
</script>
